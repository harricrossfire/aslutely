<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jumper Quiz Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="./jump_man.css" rel="stylesheet">
    <link href="../../global.css" rel="stylesheet">
</head>
<body>
    <header class="site-nav">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="background: var(--accent); width: 10px; height: 10px; border-radius: 2px;"></div>
            <span style="font-weight: 900; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;">ASLUTELY</span>
        </div>
        <div style="display: flex; gap: 20px;">
            <a href="../../index.html" class="label" style="text-decoration: none; color:white;">Practice</a>
            <a href="../../lexicon.html" class="label" style="text-decoration: none;">Vocabulary</a>
        </div>
    </header>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-container">
            <div id="jumps-display">Jumps: 3</div>
            <div id="level-display">Level: 1</div>
            <button id="quiz-button" class="mt-4 bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded-lg text-sm">
                Get Jumps
            </button>
        </div>

        <!-- Mobile Hint -->
        <div id="mobile-hint" class="mobile-hint hidden">
            Tap anywhere to jump
        </div>

        <!-- Topic Selection Modal -->
        <div id="topic-modal" class="modal w-11/12 max-w-sm p-6 rounded-lg text-center">
            <h2 class="text-2xl md:text-3xl mb-6 text-blue-300">Choose a Topic!</h2>
            <div id="topic-buttons" class="flex flex-col gap-2 max-h-48 overflow-y-auto pr-2">
                <!-- Topic buttons will be injected by JS -->
            </div>
        </div>

        <!-- GIF Quiz Modal -->
        <div id="gif-modal" class="modal w-11/12 max-w-md p-6 rounded-lg text-center">
            <h2 class="text-xl md:text-2xl mb-4 text-blue-400" id="gif-question">What is this?</h2>
            <img id="gif-image" src="" alt="Challenge GIF" class="w-full h-48 object-contain mx-auto mb-6 rounded-md border-2 border-blue-400">
            <div class="grid grid-cols-2 gap-4">
                <button id="option0" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
                <button id="option1" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
                <button id="option2" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
                <button id="option3" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
            </div>
        </div>
        <div id="message-box" class="hidden">
            <p id="message-text"></p>
        </div>
    </div>
    <script src="jump_man.js"></script>
</body>
</html>
